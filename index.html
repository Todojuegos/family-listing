<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Family List">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style-paper.css">
  <title>Family Listing</title>
</head>
<body>

  <!-- ===== PIN SCREEN ===== -->
  <div id="pin-screen" class="screen active">
    <div class="pin-container">
      <div class="pin-icon">🛒</div>
      <h1>Family Listing</h1>
      <p class="pin-subtitle">Introduce el PIN familiar para acceder</p>
      <form id="pin-form">
        <input type="password" id="pin-input" class="pin-input" inputmode="numeric"
               pattern="[0-9]*" maxlength="10" placeholder="PIN" autofocus autocomplete="off">
        <button type="submit" id="pin-submit" class="btn btn-primary btn-full">Entrar</button>
      </form>
      <p id="pin-error" class="pin-error hidden">PIN incorrecto</p>
    </div>
  </div>

  <!-- ===== APP SCREEN ===== -->
  <div id="app-screen" class="screen">

    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">🛒 Family Listing</h1>
      <button id="logout-btn" class="btn btn-ghost btn-sm" title="Cerrar sesión">🚪</button>
    </header>

    <!-- Add Product Form -->
    <section class="add-section">
      <h2 class="section-title">Añadir producto</h2>
      <form id="add-form" class="add-form">
        <div class="form-row">
          <input type="text" id="add-name" class="input" placeholder="Nombre del producto *" required autocomplete="off">
        </div>
        <div class="form-row form-row-split">
          <input type="text" id="add-quantity" class="input" placeholder="Cantidad *" required autocomplete="off"
                 list="quantity-suggestions">
          <datalist id="quantity-suggestions">
            <option value="1">
            <option value="2">
            <option value="3">
            <option value="1 docena">
            <option value="1 paquete">
            <option value="1 botella">
            <option value="250g">
            <option value="500g">
            <option value="1kg">
          </datalist>
          <select id="add-category" class="input" required>
            <option value="">Categoría *</option>
          </select>
        </div>
        <div class="form-row form-row-split">
          <select id="add-addedby" class="input" required>
            <option value="">Quién *</option>
          </select>
          <input type="text" id="add-store" class="input" placeholder="Tienda (opcional)" autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary btn-full">➕ Añadir a la lista</button>
      </form>
    </section>

    <!-- Product List -->
    <section class="list-section">
      <div class="list-header">
        <h2 class="section-title">Lista de la compra</h2>
        <div class="list-actions">
          <span id="list-count" class="list-count">0 productos</span>
          <button id="clear-btn" class="btn btn-outline btn-sm">Limpiar ▾</button>
          <div id="clear-dropdown" class="dropdown hidden">
            <button data-action="reset-all">🔄 Marcar todo pendiente</button>
            <button data-action="clear-purchased">🗑️ Borrar comprados</button>
          </div>
        </div>
      </div>

      <!-- Loading state -->
      <div id="list-loading" class="list-loading">
        <p>Cargando lista...</p>
      </div>

      <!-- Empty state -->
      <div id="list-empty" class="list-empty hidden">
        <div class="empty-icon">📋</div>
        <p>La lista está vacía</p>
        <p class="empty-hint">Añade tu primer producto arriba 👆</p>
      </div>

      <!-- Product list -->
      <ul id="product-list" class="product-list"></ul>
    </section>

    <!-- Editing overlay -->
    <div id="edit-overlay" class="overlay hidden">
      <div class="overlay-content">
        <h3>Editar producto</h3>
        <form id="edit-form">
          <input type="hidden" id="edit-id">
          <div class="form-row">
            <label for="edit-name">Nombre</label>
            <input type="text" id="edit-name" class="input" required>
          </div>
          <div class="form-row">
            <label for="edit-quantity">Cantidad</label>
            <input type="text" id="edit-quantity" class="input" required>
          </div>
          <div class="form-row">
            <label for="edit-category">Categoría</label>
            <select id="edit-category" class="input" required></select>
          </div>
          <div class="form-row">
            <label for="edit-addedby">Quién</label>
            <select id="edit-addedby" class="input" required></select>
          </div>
          <div class="form-row">
            <label for="edit-store">Tienda</label>
            <input type="text" id="edit-store" class="input">
          </div>
          <div class="form-row form-row-split">
            <button type="button" id="edit-cancel" class="btn btn-outline">Cancelar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Supabase SDK from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- App logic -->
  <script src="app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .catch(() => console.log('SW registration failed — running without offline support'));
    }
  </script>
</body>
</html>
