<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Family Listing">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Family Listing</title>
</head>
<body>

  <!-- ===== PIN SCREEN ===== -->
  <section id="pin-screen" class="screen">
    <div class="pin-container">
      <div class="pin-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 0-7 7v3H4a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1h-1V9a7 7 0 0 0-7-7Z"/>
          <circle cx="12" cy="16" r="1.5"/>
          <path d="M12 13.5V16"/>
        </svg>
      </div>
      <h1>Family Listing</h1>
      <p class="pin-subtitle">Introduce el PIN familiar</p>
      <form id="pin-form">
        <input
          type="password"
          id="pin-input"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="PIN"
          autocomplete="off"
          required
        >
        <button type="submit" id="pin-submit">Entrar</button>
        <p id="pin-error" class="pin-error hidden"></p>
      </form>
    </div>
  </section>

  <!-- ===== MAIN APP SCREEN ===== -->
  <section id="app-screen" class="screen hidden">

    <!-- Header -->
    <header class="app-header">
      <h1>Lista de la compra</h1>
      <button id="logout-btn" class="btn-icon" aria-label="Cerrar sesión">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <main class="app-content">

      <!-- Add product form -->
      <section class="add-section">
        <form id="add-form" class="add-form">
          <div class="add-row">
            <input
              type="text"
              id="add-name"
              placeholder="Nombre del producto"
              required
              autocomplete="off"
            >
            <input
              type="number"
              id="add-quantity"
              placeholder="Cant."
              min="1"
              step="1"
              value="1"
              list="quantity-suggestions"
            >
            <datalist id="quantity-suggestions">
              <option value="1">
              <option value="2">
              <option value="3">
              <option value="4">
              <option value="5">
              <option value="6">
              <option value="10">
            </datalist>
            <button type="submit" id="add-submit" class="btn-primary">Añadir</button>
          </div>
          <div class="add-row add-row-cols">
            <select id="add-category">
              <option value="">Categoría</option>
              <option value="Fruta y verdura">Fruta y verdura</option>
              <option value="Carne y pescado">Carne y pescado</option>
              <option value="Lácteos y huevos">Lácteos y huevos</option>
              <option value="Panadería">Panadería</option>
              <option value="Congelados">Congelados</option>
              <option value="Bebidas">Bebidas</option>
              <option value="Despensa">Despensa</option>
              <option value="Limpieza">Limpieza</option>
              <option value="Higiene">Higiene</option>
              <option value="Otros">Otros</option>
            </select>
            <select id="add-addedby" required>
              <option value="">Quién añade</option>
              <option value="Alex">Alex</option>
              <option value="Natalia">Natalia</option>
              <option value="Martín">Martín</option>
            </select>
            <input
              type="text"
              id="add-store"
              placeholder="Tienda (opcional)"
              autocomplete="off"
            >
          </div>
        </form>
      </section>

      <!-- Product list -->
      <section class="list-section">
        <div class="list-header">
          <h2>Productos <span id="list-count">0</span></h2>
          <div class="clear-wrapper">
            <button id="clear-btn" class="btn-ghost">Limpiar</button>
            <div id="clear-dropdown" class="clear-dropdown hidden">
              <button data-action="reset-all" class="dropdown-item">Reiniciar lista</button>
              <button data-action="delete-purchased" class="dropdown-item">Eliminar comprados</button>
            </div>
          </div>
        </div>

        <div id="list-loading" class="list-state">
          <div class="spinner"></div>
          <p>Cargando productos...</p>
        </div>

        <div id="list-empty" class="list-state hidden">
          <p>No hay productos en la lista.</p>
          <p class="list-empty-hint">Añade productos con el formulario de arriba.</p>
        </div>

        <ul id="product-list" class="product-list hidden"></ul>
      </section>

    </main>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

  </section>

  <!-- ===== EDIT OVERLAY (bottom sheet) ===== -->
  <div id="edit-overlay" class="edit-overlay hidden">
    <div class="edit-sheet">
      <h2>Editar producto</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-id">

        <label for="edit-name">Nombre</label>
        <input type="text" id="edit-name" required autocomplete="off">

        <label for="edit-quantity">Cantidad</label>
        <input type="number" id="edit-quantity" min="1" step="1" value="1">

        <label for="edit-category">Categoría</label>
        <select id="edit-category">
          <option value="">Seleccionar</option>
          <option value="Fruta y verdura">Fruta y verdura</option>
          <option value="Carne y pescado">Carne y pescado</option>
          <option value="Lácteos y huevos">Lácteos y huevos</option>
          <option value="Panadería">Panadería</option>
          <option value="Congelados">Congelados</option>
          <option value="Bebidas">Bebidas</option>
          <option value="Despensa">Despensa</option>
          <option value="Limpieza">Limpieza</option>
          <option value="Higiene">Higiene</option>
          <option value="Otros">Otros</option>
        </select>

        <label for="edit-addedby">Añadido por</label>
        <select id="edit-addedby" required>
          <option value="">Seleccionar</option>
          <option value="Alex">Alex</option>
          <option value="Natalia">Natalia</option>
          <option value="Martín">Martín</option>
        </select>

        <label for="edit-store">Tienda</label>
        <input type="text" id="edit-store" autocomplete="off">

        <div class="edit-actions">
          <button type="button" id="edit-cancel" class="btn-ghost">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App script -->
  <script src="app.js"></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('SW registrado'))
        .catch(err => console.error('Error al registrar SW:', err));
    }
  </script>

</body>
</html>
